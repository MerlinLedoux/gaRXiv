categories:
  - cs.CL
  - cs.LG

authors: []
  # - Yoshua Bengio
  # - Geoffrey Hinton

storage:
  db_path: data/garxiv.db
  pdf_dir: data/pdfs
  parsed_dir: data/parsed

max_results_per_run: 100

chunking:
  target_tokens: 800
  overlap_ratio: 0.125
  min_chunk_tokens: 100

embeddings:
  provider: local_bge
  model_name: BAAI/bge-small-en-v1.5
  batch_size: 32

vector_store:
  backend: qdrant
  url: http://localhost:6333
  distance: cosine

llm:
  provider: ollama
  model_name: llama3.2:3b
  base_url: http://localhost:11434

search:
  top_k: 10
  dense_top_k: 20
  lexical_top_k: 20
  hybrid_enabled: true
  rrf_k: 60
  query_transform:
    mode: none        # none | multi_query | hyde
    multi_query_count: 3
  rerank:
    enabled: false
    model_name: BAAI/bge-reranker-base
    top_k_candidates: 50
